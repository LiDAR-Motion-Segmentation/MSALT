defaults:
  - msalt_setup: semantic_kitti
  - models: default
  - _self_

app:
  window_title: "MSALT: Multi Sensor Fusion Annotator"
  window_size: [1600, 900]

output:
  dir: "${hydra:runtime.cwd}/MSALT_outputs_annotations_kitti"

labels:
  - name: "moving_people"
    color: [255, 0, 0]        # Red
    hotkey: "1"               
    
  - name: "static_people"
    color: [255, 255, 0]      # Yellow
    hotkey: "2"

  - name: "unknown"
    color: [0, 255, 0]        # Green
    hotkey: "3"

  - name: "static_car"
    color: [255, 255, 255]    # white
    hotkey: "4"

  - name: "moving_car"
    color: [255, 0, 255]      # Magenta
    hotkey: "5"

geometry:
  fit_box_to_cloud:
    eps: 0.5
    min_samples: 8
  fit_box_with_pca:
    eps: 0.5
    min_samples: 4

automation:
  track_horizon: 10

lidar_view:
  default_ground_z: -1.5
  ground_percentile: 0.5   # percentile used to estimate ground from point cloud Z
  ground_bias: 0.05        # small downward bias so boxes don't float above ground