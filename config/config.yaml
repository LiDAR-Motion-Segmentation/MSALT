defaults:
  - msalt_setup: nuscenes
  - models: default
  - _self_

app:
  window_title: "MSALT: Multi Sensor Fusion Annotator"
  window_size: [1600, 900]

output:
  dir: "${hydra:runtime.cwd}/MSALT_outputs_annotations_nuscenes"

labels:
  - name: "moving_people"
    color: [255, 0, 0]        # Bright Red
    hotkey: "1"               
    
  - name: "static_people"
    color: [0, 255, 0]        #  Green
    hotkey: "2"

  - name: "unknown"
    color: [0, 255, 0]        # Green
    hotkey: "3"

  - name: "static_car"
    color: [255, 255, 255]    # white
    hotkey: "4"

  - name: "moving_car"
    color: [255, 0, 255]      # Magenta
    hotkey: "5"

  - name: "moving_truck"
    color: [255, 140, 0]      # Dark Orange (Vibrant, distinct from Red)
    hotkey: "6"

  - name: "static_truck"
    color: [255, 20, 147]     # Deep Pink (Kept as is, good visibility)
    hotkey: "7"

  - name: "moving_bus"
    color: [255, 215, 0]      # Gold matches with the orange colour
    hotkey: "8"

  - name: "static_bus"
    color: [128, 128, 0]      # Olive (Dark Yellow-Green) 
    hotkey: "9"

  - name: "moving_cyclist"
    color: [0, 255, 255]      # Cyan (Bright Electric Blue)
    hotkey: "10"

  - name: "static_cyclist"
    color: [102, 0, 204]      # Purple
    hotkey: "11"

  - name: "moving_construction_vehicle"
    color: [255, 20, 147]     # Deep Pink (Kept as is, good visibility)
    hotkey: "12"

  - name: "static_construction_vehicle"
    color: [199, 21, 133]     # Medium Violet Red (Darker, solid Pink) 
    hotkey: "13"

  - name: "moving_other_vehicle"
    color: [138, 43, 226]     # Blue-Violet (Neon Purple) 
    hotkey: "14"

  - name: "static_other_vehicle"
    color: [75, 0, 130]       # Indigo (Very Dark Purple)
    hotkey: "15"

geometry:
  fit_box_to_cloud:
    eps: 0.5
    min_samples: 8
  fit_box_with_pca:
    eps: 0.5
    min_samples: 4

automation:
  track_horizon: 10

lidar_view:
  default_ground_z: -1.5
  ground_percentile: 0.5   # percentile used to estimate ground from point cloud Z
  ground_bias: 0.05        # small downward bias so boxes don't float above ground