# A robust config for a 5-camera + LiDAR setup
name: "KITTI_Sample_001"

paths:
  # Base directory for the sequence
  root_dir: "/data/kitti/2011_09_26/2011_09_26_drive_0005_sync"
  
  # Relative paths to image folders
  image_folders:
    CAM_00: "image_00/data"
    CAM_01: "image_01/data"
    CAM_02: "image_02/data"
    CAM_03: "image_03/data"
  
  # Relative path to LiDAR data
  lidar_folder: "velodyne_points/data"
  
  # Path to calibration file (KITTI format usually needs special parsing)
  calib_file: "calib_cam_to_velo.txt"

# Metadata for UI display
cameras:
  - id: "CAM_00"
    name: "Grayscale Left"
  - id: "CAM_01"
    name: "Grayscale Right"
  - id: "CAM_02"
    name: "Color Left"
  - id: "CAM_03"
    name: "Color Right"

# File extension settings
extensions:
  images: ".png"
  lidar: ".bin" # KITTI uses binary, others might use .pcd