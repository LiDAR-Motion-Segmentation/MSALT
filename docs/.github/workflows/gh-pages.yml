name: Deploy mdBook to GitHub Pages

on:
  push:
    branches:
      - main  # Change this to 'master' if that is your default branch name

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Grants permission to push the compiled site

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Build Documentation
        run: mdbook build docs  # Points to your docs folder

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/book  # Where mdBook drops the compiled HTML