name: MSALT CI Pipeline

# Trigger on Push to Main or Pull Requests
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    # Check out the code
    - uses: actions/checkout@v4

    # Install "uv" (The fast python package manager)
    - name: Install uv
      uses: astral-sh/setup-uv@v4
      with:
        enable-cache: true
        version: "0.10.0"
        github-token: ${{ secrets.GITHUB_TOKEN }}
        cache-dependency-glob: "**/uv.lock"

    # Install Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # Install Dependencies
    # We use --system or sync to install packages
    - name: Install dependencies
      run: |
        uv sync --all-extras --dev

    # Linting (Check for messy code)
    - name: Run Ruff (Linting)
      run: uv run ruff check src/

    # Run pre-commit hooks (ruff + ruff-format)
    - name: Run pre-commit
      env:
        PRE_COMMIT_HOME: .pre-commit-cache
      run: |
        uv run pre-commit run --all-files

    # Run Tests
    - name: Run Tests
      uses: GabrielBB/xvfb-action@v1 # Simulates a display
      with:
        run: uv run pytest test/